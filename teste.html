<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="progress">
        <div class="progress-bar-html"></div>
    </div>
</body>
<style>
    .progress{
    height: 5px;
    background-color: #000;
    position: relative;
}

.progress .progress-bar-html{
   position: absolute;
   height: 100%;
   background-color: #ee5f23;
   animation: progress-html-animation 4s infinite;
}
@keyframes progress-html-animation{
    0% { width: 0%; }
    100% { width: 100%}
    
}
</style>
</html>
